services:
  mongo:
    image: mongo:latest
    container_name: animedle-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment: 
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: animedle
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5
  
  # A seeder service to populate the database with initial data
  db-seeder:
    image: node:22-alpine
    container_name: mongo_seeder
    working_dir: /app
    volumes:
      - ./data_fetcher/:/app
    environment:
      - MONGO_URI=mongodb://admin:adminpassword@mongo:27017/animedle?authSource=admin
    command: sh -c "npm install && npm run start:insert"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
